name: Generate Snake Animation                                                                                                                            
                                                                                                                                                            
  on:                                                                                                                                                       
    schedule:                                                                                                                                               
      - cron: "0 */12 * * *"                                                                                                                              
    workflow_dispatch:                                                                                                                                      
   
  jobs:                                                                                                                                                     
    build:                                                                                                                                                
      runs-on: ubuntu-latest
      steps:
        - name: generate-snake-game-from-github-contribution-grid
          uses: Platane/snk@v3.3.0
          with:                                                                                                                                             
            github_user_name: Sri-Manikandan
            outputs: |                                                                                                                                      
              dist/github-snake.svg?palette=github-light&color_snake=#0d9488                                                                              
              dist/github-snake-dark.svg?palette=github-dark&color_snake=#0d9488                                                                            
              dist/github-snake.gif?palette=github-dark&color_snake=#f59e0b&color_dots=#161b22,#0d4429,#006d32,#26a641,#39d353
                                                                                                                                                            
        - name: deploy to output branch                                                                                                                   
          uses: crazy-max/ghaction-github-pages@v3.1.0                                                                                                      
          with:                                                                                                                                           
            target_branch: output
            build_dir: dist                                                                                                                                 
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
